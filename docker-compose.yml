version: '3.8'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nfe_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    working_dir: /usr/src/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nfe_db
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    command: npm run dev

volumes:
  postgres-data:

